name: Build Flutter APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Create full Flutter project
        run: |
          flutter create wealthassure_app
          ls -la wealthassure_app

      - name: Copy your code
        run: |
          rm -rf wealthassure_app/lib/*
          cp -r repo/lib/* wealthassure_app/lib/
          cp repo/pubspec.yaml wealthassure_app/
          cd wealthassure_app
          flutter pub get

      - name: Build APK
        run: |
          cd wealthassure_app
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: wealthassure-app
          path: wealthassure_app/build/app/outputs/flutter-apk/app-release.apk
